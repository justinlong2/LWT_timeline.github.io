# Site Settings
title: Project Dashboard
description: Schedule and Review Tracking
remote_theme: just-the-docs/just-the-docs

# Color Scheme (Optional: 'light' or 'dark')
color_scheme: light

# Enable Mermaid globally
mermaid:
  version: "10"

# Use the full width of the screen for your content
defaults:
  - scope:
      path: ""
    values:
      layout: default
      # This ensures your tables and charts aren't squeezed
      full_width: true
